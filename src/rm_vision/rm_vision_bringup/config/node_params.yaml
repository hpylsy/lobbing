/camera_node:
  ros__parameters:
    camera_info_url: package://rm_vision_bringup/config/camera_info.yaml
    pixel_format: "BayerRG8"        # Recommended Option: "RGB8Packed", "BayerRG8"
    adc_bit_depth: "Bits_8"         # If using "BayerRG8", <adc_bit_depth> must be set as "Bits_8"; otherwise, it can be "Bits_8" or "Bits_12"
    use_sensor_data_qos: true
    camera_name: "camera"
    # frame_id: "optical_frame"     # If not set, it will be set as <camera_name>_optical_frame
    # camera_topic: "image"         # If not set, it will be set as <camera_name>/image

    acquisition_frame_rate: 200.0   # Unit: Hz
    exposure_time: 3000             # Unit: us
    gain: 8.0                      # Range: 0.0 ~ 16.9, Unit: dB

/serial_driver:
  ros__parameters:
    timestamp_offset: 0.006
    device_name: /dev/ttyACM0
    baud_rate: 115200
    flow_control: none
    parity: none
    stop_bits: "1"

/armor_detector:
  ros__parameters:
    debug: true
    model_name: yolov5.xml
    device: CPU
    is_use_thread_pool: false
    confidence_threshole: 0.8
    num_yolo_thread: 6
    detect_color: 0
    use_traditional: true
    use_pca: false
    use_ba: true
    binary_threshold: 80
    max_angle_error: 45 # degree
    min_lightbar_ratio: 1.5
    max_lightbar_ratio: 20
    min_lightbar_length: 8
    tolerate: 0.2 #distance between network points and traditional points
    
/armor_tracker:
  ros__parameters:
    target_frame: odom
    max_armor_distance: 15.0

    ekf:
      sigma2_q_xyz_max: 100.0
      sigma2_q_xyz_min: 80.0
      sigma2_q_yaw_max: 400.0
      sigma2_q_yaw_min: 300.0
      sigma2_q_r: 40.0

      r_py: 4e-3
      r_d: 0.05
      r_yaw: 0.02

    tracker:
      max_match_distance: 0.5
      max_match_yaw_diff: 0.8
      max_match_angle_diff: 1.0
      tracking_thres: 5
      lost_time_thres: 0.5

/rm_planner:
  ros__parameters:
    debug: true
    simulation: false
    prediction_delay: 0.01
    compensator_type: ideal
    iteration_times: 20
    bullet_speed: 16.5
    gravity: 9.8
    resistance: 0.001
    fire_thresh: 0.003
    
    gimbal:
     max_yaw_acc: 50
     max_pitch_acc: 100

    pitch_offset: [
        "5.0 6.0 -1.0 0.4 0.0",
        "5.0 6.0  0.4 0.8 0.0",
        "5.0 6.0  0.8 1.2 0.0",
        "6.0 7.0 -1.0 0.4 0.0",
        "6.0 7.0  0.4 0.8 0.0",
        "6.0 7.0  0.8 1.2 0.0",
        "7.0 8.0 -1.0 0.4 0.0",
        "7.0 8.0  0.4 0.8 0.0",
        "7.0 8.0  0.8 1.2 0.0",
      ]


/buff_detector:
  ros__parameters:
    detector:
      bin.blue_arrow_thres: 140
      bin.blue_blade_thres: 140
      bin.red_arrow_thres: 150
      bin.red_blade_thres: 150

      arrow.min_area: 50
      arrow.max_area: 500
      arrow.aspect_ratio_max: 5
      arrow.num_min: 4
      arrow.num_max: 10
      arrow.same_area_ratio_max: 5
      arrow.aspect_ratio_min: 2
      arrow.aspect_ratio_max: 12
      arrow.area_max: 4000

      blade.canny_thres: 50
      blade.Hough_thres: 100
      blade.min_Radius: 1
      blade.max_Radius: 10000
      blade.min_dis: 1
      blade.max_dis: 10
      blade.thres_ratio: 50
      blade.contours_max: 50
      blade.contours_min: 66

      roi.distance_ratio: 1.2
      roi.width: 200
      roi.armor_center_vertical_distance_threshold: 90
      roi.global_roi_length_ratio: 1.5

      R.area_min: 100
      R.area_max: 1000 
      R.aspect_ratio_max: 2

/buff_tracker:
  ros__parameters:
    target_frame: odom

    ekf:
      sigma2_q_xyz: 1e-3
      sigma2_q_theta: 2.09 # a_max * w_max
      sigma2_q_r: 0.0

      r_blade: 6e-4
      r_center: 2e-4

    gns:
      min_a: 0.4
      max_a: 1.3
      min_w: 1.5
      max_w: 2.3
      max_iter: 50
      min_step: 1e-10
      obs_max_size: 150
      a_start: 0.9125
      w_start: 1.942
      c_start: 0.0
      min_first_solve_time: 2.0

    ekf_gns:
      sigma2_q_a: 1e-5
      sigma2_q_w: 1e-5
      sigma2_q_c: 1e2
      r_a: 1e-8
      r_w: 1e-8
      r_c: 1e-8

    tracker:
      lost_time_threshold: 2.0
      max_match_theta: 0.4
      max_match_center_xoy: 1.0

      tracking_threshold: 20

      blade_z_ground: 1603.0
      robot_z_ground: 416.0
      distance: 6626.0
      max_distance_diff: 120.0

/rm_auto_record:
  ros__parameters:
    uri: "/ros_ws/"
    topic_name:
    - "/image_raw/compressed"
    - "/camera_info"
    - "/detector/armors"
    topic_type:
    - "sensor_msgs/msg/CompressedImage"
    - "sensor_msgs/msg/CameraInfo"
    - "auto_aim_interfaces/msg/Armors"

lob_vision_node:   # <--- 【核心修改 1】：节点名称统一为融合后的 lob_vision_node
  ros__parameters:
    # ====================================
    # 基础图像处理参数 (光流与二值化)
    # ====================================
    binary_threshold: 25
    morph_kernel_size: 7

    # ====================================
    # 飞镖追踪 (LobTracker) 轮廓筛选参数
    # ====================================
    min_area: 350.0              
    max_area: 1600.0             
    min_circularity: 0.4        
    min_aspect_ratio: 0.5       
    max_aspect_ratio: 2.5       
    min_trajectory_length_ratio: 0.2
    # ====================================
    # 候选轨迹 (Tracklet) 参数
    # ====================================
    tracklet_confirm_age: 2         
    tracklet_min_down_speed: 9.0    

    # ====================================
    # 正式轨迹与卡尔曼滤波参数
    # ====================================
    max_prediction_error: 550.0      
    max_lost_frames: 3              
    max_trajectory_len: 120         

    # ====================================
    # 轨迹重连 (ReID) 与弯曲突变检测参数
    # ====================================
    max_finished_track_age: 10      
    reid_threshold: 270.0            
    max_angle_change: 30.0          
    min_points_for_smooth_check: 3  

    # ====================================
    # 功能开关 & 视频源参数
    # ====================================
    enable_motion_detection: true
    show_fused_window: true    # 最终的融合效果总窗
    show_lob_debug: true     # 弹丸追踪的中间过程窗 (光流、差分、掩码等)

    video_source: "camera"  # "video" 或 "camera"
    video_path: "/home/hpy/pioneer/hero/aim/source/8.mp4"
    video_fps: 150.0
    enable_source_alarm: true

    # ====================================
    # 引导灯 (GuideLight) 原版高阶参数
    # 【核心修改 2】：完美对接你原版算法的 12 个核心参数！
    # ====================================
    green:
      debug: true
      binaryThreshold: 60       # 原来的 G-R 二值化阈值
      epsilon: 100              # 多边形逼近参数 (1/epsilon)
      contoursRatioMin: 50      # 轮廓长宽比下限 (内部会除以100，即0.5)
      contoursRatioMax: 150     # 轮廓长宽比上限 (即1.5)
      contoursAreaMin: 100      # 轮廓面积下限
      contoursAreaMax: 20000    # 轮廓面积上限
      filledRatioMin: 50        # 真实发光饱满度下限 (50%)
      filledRatioMax: 100       # 真实发光饱满度上限 (100%)
      ellipseAreaMin: 100       # 拟合椭圆面积下限
      ellipseAreaMax: 20000     # 拟合椭圆面积上限
      ellipseRatioMin: 50       # 椭圆长宽比下限 (0.5)
      ellipseRatioMax: 150      # 椭圆长宽比上限 (1.5)